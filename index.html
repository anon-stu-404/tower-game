<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
<title>Tower Stack · Rizwan & Anha</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#080810;--s:rgba(255,255,255,0.04);--b:rgba(255,255,255,0.07);
  --r:#7c6fef;--a:#ee6fae;--tx:#e8e4ff;--mu:rgba(232,228,255,0.42);
  --ye:#fbbf24;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);touch-action:manipulation}
body{font-family:'Syne',sans-serif;color:var(--tx);display:flex;flex-direction:column}

/* Stars */
#bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.st{position:absolute;border-radius:50%;background:#fff}

/* Layout */
#app{position:relative;z-index:1;display:flex;flex-direction:column;height:100dvh;padding:7px;gap:5px}

/* Header */
#hdr{display:flex;align-items:center;gap:10px;background:var(--s);border:1px solid var(--b);border-radius:12px;padding:7px 14px;flex-shrink:0}
#logo{font-size:.95rem;font-weight:800;white-space:nowrap}
#logo .r{color:var(--r)} #logo .a{color:var(--a)} #logo .vs{color:var(--mu);font-weight:700;margin:0 5px}
#rbadge{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--mu);background:rgba(255,255,255,0.04);border:1px solid var(--b);border-radius:6px;padding:2px 9px;white-space:nowrap;margin-right:auto}
#sc{display:flex;gap:12px;align-items:center;flex-shrink:0}
.sb{text-align:center}
.sn{font-size:.58rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;opacity:.5}
.sv{font-size:1.45rem;font-weight:800;line-height:1}
.sb.r .sv{color:var(--r)} .sb.a .sv{color:var(--a)}
#chatbtn{background:var(--s);border:1px solid var(--b);border-radius:8px;padding:5px 11px;cursor:pointer;font-family:'Syne',sans-serif;font-size:.75rem;color:var(--tx);transition:all .15s;white-space:nowrap;flex-shrink:0}
#chatbtn:hover{background:rgba(255,255,255,0.08)}
#chatbtn.ping{border-color:var(--a);color:var(--a)}

/* Main */
#main{flex:1;display:flex;gap:7px;min-height:0}
#ga{flex:1;display:flex;flex-direction:column;gap:5px;min-width:0;min-height:0}

/* Turn bar */
#tb{background:var(--s);border:1px solid var(--b);border-radius:9px;padding:6px 14px;text-align:center;flex-shrink:0;font-size:.8rem;font-weight:700;transition:border-color .25s}
#tb.rt{border-color:rgba(124,111,239,.45)}
#tb.at{border-color:rgba(238,111,174,.45)}
#tb.se{border-color:rgba(251,191,36,.35)}

/* Canvas */
#cw{flex:1;position:relative;background:var(--s);border:1px solid var(--b);border-radius:12px;overflow:hidden;min-height:0;cursor:default}
canvas{display:block;width:100%;height:100%}

/* Controls */
#ctrl{display:flex;flex-direction:column;gap:4px;flex-shrink:0}
.crow{display:flex;gap:4px;justify-content:center}
.btn{background:var(--s);border:1px solid var(--b);border-radius:9px;color:var(--tx);font-family:'Syne',sans-serif;font-weight:700;cursor:pointer;transition:background .12s,transform .1s;padding:9px 0;font-size:.85rem;user-select:none;-webkit-tap-highlight-color:transparent}
.btn:disabled{opacity:.22;cursor:not-allowed;pointer-events:none}
.btn:not(:disabled):active{transform:scale(.94);background:rgba(255,255,255,0.1)}
.mbtn{min-width:96px;font-size:.95rem}
.rbtn{min-width:74px;font-size:.8rem}
#bdrop{background:linear-gradient(135deg,var(--r),var(--a));border:none;min-width:110px;font-size:.95rem;box-shadow:0 2px 14px rgba(124,111,239,.35)}
#bdrop:not(:disabled):active{filter:brightness(1.15)}

/* Pos indicator */
#piw{height:3px;background:rgba(255,255,255,0.06);border-radius:2px;margin:0 6px;flex-shrink:0;position:relative}
#pi{position:absolute;top:-5px;width:9px;height:13px;background:var(--r);border-radius:3px;transform:translateX(-50%);transition:left .08s linear}

/* Overlays */
.ov{display:none;position:absolute;inset:0;border-radius:12px;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:50}
.ov.show{display:flex}
#wov{background:rgba(5,5,14,.75);backdrop-filter:blur(8px)}
#gov{background:rgba(5,5,14,.88);backdrop-filter:blur(14px)}
#gov-title{font-size:1.8rem;font-weight:800;text-align:center}
#gov-sub{font-size:.88rem;color:var(--mu);text-align:center}
#bagain{background:linear-gradient(135deg,var(--r),var(--a));border:none;border-radius:11px;padding:10px 36px;font-family:'Syne',sans-serif;font-size:.92rem;font-weight:700;color:#fff;cursor:pointer;box-shadow:0 3px 18px rgba(124,111,239,.4);transition:filter .15s,transform .15s}
#bagain:hover{filter:brightness(1.12);transform:translateY(-2px)}
.spin{width:34px;height:34px;border:3px solid var(--b);border-top-color:var(--r);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* Chat */
#cpanel{width:264px;flex-shrink:0;display:none;flex-direction:column;background:rgba(8,8,18,.98);border:1px solid var(--b);border-radius:12px;overflow:hidden}
#cpanel.show{display:flex}
#chdr{padding:10px 14px;border-bottom:1px solid var(--b);font-weight:700;font-size:.8rem;display:flex;justify-content:space-between;align-items:center}
#cclose{background:none;border:none;color:var(--mu);cursor:pointer;font-size:.9rem;padding:1px 5px;border-radius:5px}
#cclose:hover{background:rgba(255,255,255,0.06);color:var(--tx)}
#cmsgs{flex:1;overflow-y:auto;padding:8px 10px;display:flex;flex-direction:column;gap:6px;scrollbar-width:thin;scrollbar-color:var(--b) transparent;min-height:0}
.cm{font-size:.74rem;line-height:1.45}
.cm .who{font-weight:700;margin-right:4px}
.cm .who.rizwan{color:var(--r)} .cm .who.anha{color:var(--a)}
.cm .wt{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--mu);margin-left:3px}
#cform{display:flex;gap:4px;padding:8px;border-top:1px solid var(--b)}
#cinput{flex:1;background:rgba(255,255,255,0.05);border:1px solid var(--b);border-radius:7px;padding:6px 8px;color:var(--tx);font-family:'Syne',sans-serif;font-size:.74rem;outline:none}
#cinput:focus{border-color:rgba(124,111,239,.5)}
#csend{background:var(--r);border:none;border-radius:7px;padding:6px 11px;color:#fff;cursor:pointer;font-family:'Syne',sans-serif;font-size:.74rem;font-weight:700}
#csend:hover{filter:brightness(1.2)}

/* Toast */
#toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%) translateY(50px);background:rgba(18,18,32,.97);border:1px solid var(--b);border-radius:9px;padding:8px 18px;font-size:.78rem;color:var(--tx);transition:transform .28s cubic-bezier(.175,.885,.32,1.275);z-index:999;pointer-events:none;white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0)}

/* Rejected */
#rej{display:none;position:fixed;inset:0;background:var(--bg);z-index:9999;flex-direction:column;align-items:center;justify-content:center;gap:14px}
#rej.show{display:flex}
#rej-icon{font-size:3rem}
#rej-msg{font-size:.95rem;color:var(--mu);text-align:center;max-width:280px;line-height:1.55}

@media(max-width:580px){
  #cpanel{position:fixed;inset:0;width:100%;border-radius:0;z-index:200}
  .mbtn{min-width:76px}
}
</style>
</head>
<body>
<div id="bg"></div>
<div id="rej"><div id="rej-icon">🔒</div><div id="rej-msg"></div></div>

<div id="app">
  <div id="hdr">
    <div id="logo"><span class="r">Rizwan</span><span class="vs">vs</span><span class="a">Anha</span></div>
    <div id="rbadge">Round 1/3</div>
    <div id="sc">
      <div class="sb r"><div class="sn">Rizwan</div><div class="sv" id="sr">0</div></div>
      <div style="color:var(--mu);font-size:.9rem">·</div>
      <div class="sb a"><div class="sn">Anha</div><div class="sv" id="sa">0</div></div>
    </div>
    <button id="chatbtn">💬 Chat</button>
  </div>

  <div id="main">
    <div id="ga">
      <div id="tb">Connecting…</div>
      <div id="piw"><div id="pi" style="left:50%"></div></div>
      <div id="cw">
        <canvas id="cv"></canvas>
        <div class="ov" id="wov">
          <div class="spin"></div>
          <div id="wmsg" style="font-size:.85rem;color:var(--mu)">Waiting for both players…</div>
        </div>
        <div class="ov" id="gov">
          <div id="gov-title"></div>
          <div id="gov-sub"></div>
          <button id="bagain">Play Again</button>
        </div>
      </div>
      <div id="ctrl">
        <div class="crow">
          <button class="btn mbtn" id="bml" ontouchstart="startRepeat('L','move')" ontouchend="stopRepeat()" onmousedown="startRepeat('L','move')" onmouseup="stopRepeat()" onmouseleave="stopRepeat()">◀ Move</button>
          <button class="btn mbtn" id="bmr" ontouchstart="startRepeat('R','move')" ontouchend="stopRepeat()" onmousedown="startRepeat('R','move')" onmouseup="stopRepeat()" onmouseleave="stopRepeat()">Move ▶</button>
        </div>
        <div class="crow">
          <button class="btn rbtn" id="brl" ontouchstart="startRepeat('L','rot')" ontouchend="stopRepeat()" onmousedown="startRepeat('L','rot')" onmouseup="stopRepeat()" onmouseleave="stopRepeat()">↺ Rot</button>
          <button class="btn" id="bdrop" id="bdrop">DROP</button>
          <button class="btn rbtn" id="brr" ontouchstart="startRepeat('R','rot')" ontouchend="stopRepeat()" onmousedown="startRepeat('R','rot')" onmouseup="stopRepeat()" onmouseleave="stopRepeat()">Rot ↻</button>
        </div>
      </div>
    </div>

    <div id="cpanel">
      <div id="chdr"><span>💬 Chat</span><button id="cclose">✕</button></div>
      <div id="cmsgs"></div>
      <div id="cform">
        <input id="cinput" placeholder="Message…" maxlength="200" autocomplete="off"/>
        <button id="csend">Send</button>
      </div>
    </div>
  </div>
</div>
<div id="toast"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
// ─── STARS ───────────────────────────────────────────────────────────────────
(()=>{
  const bg=document.getElementById('bg');
  for(let i=0;i<65;i++){
    const d=document.createElement('div'); d.className='st';
    const s=Math.random()*1.6+0.3;
    const delay=(Math.random()*6).toFixed(1);
    const dur=(Math.random()*5+2).toFixed(1);
    const op=(Math.random()*.5+.05).toFixed(2);
    d.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}%;top:${Math.random()*100}%;opacity:${op};animation:_tw ${dur}s ${delay}s ease-in-out infinite alternate`;
    bg.appendChild(d);
  }
  const st=document.createElement('style');
  st.textContent='@keyframes _tw{from{opacity:.03}to{opacity:.55}}';
  document.head.appendChild(st);
})();

// ─── PARAMS ──────────────────────────────────────────────────────────────────
const QS=new URLSearchParams(location.search);
const ROOM=QS.get('room')||'default';
const ME=(QS.get('player')||'').toLowerCase().trim();

// ─── CANVAS ──────────────────────────────────────────────────────────────────
const cvs=document.getElementById('cv');
const ctx=cvs.getContext('2d');
const cwrap=document.getElementById('cw');
let CW=0,CH=0,OX=0,OY=0;
const SC=36; // pixels per metre

function resize(){
  const r=cwrap.getBoundingClientRect();
  const dpr=window.devicePixelRatio||1;
  cvs.width=r.width*dpr; cvs.height=r.height*dpr;
  cvs.style.width=r.width+'px'; cvs.style.height=r.height+'px';
  CW=r.width; CH=r.height; OX=CW/2; OY=CH*0.70;
  ctx.scale(dpr,dpr);
}
let rtimer; window.addEventListener('resize',()=>{ clearTimeout(rtimer); rtimer=setTimeout(()=>{ ctx.setTransform(1,0,0,1,0,0); resize(); },80); });
setTimeout(resize,30);

function wx(x){ return OX+x*SC; }
function wy(y){ return OY-y*SC; }

// ─── SHAPE DEFS (client) ─────────────────────────────────────────────────────
const SD={
  square:   {v:[[-0.40,-0.40],[0.40,-0.40],[0.40,0.40],[-0.40,0.40]],c:'#6ee7f7'},
  rectangle:{v:[[-0.72,-0.24],[0.72,-0.24],[0.72,0.24],[-0.72,0.24]],c:'#a78bfa'},
  tallrect: {v:[[-0.20,-0.70],[0.20,-0.70],[0.20,0.70],[-0.20,0.70]],c:'#67e8f9'},
  triangle: {v:[[0,-0.60],[0.58,0.52],[-0.58,0.52]],c:'#fbbf24'},
  thintri:  {v:[[0,-0.78],[0.22,0.78],[-0.22,0.78]],c:'#fde68a'},
  trapezoid:{v:[[-0.78,-0.26],[0.78,-0.26],[0.42,0.26],[-0.42,0.26]],c:'#34d399'},
  hexagon:  {v:(()=>{const p=[];for(let i=0;i<6;i++){const a=Math.PI/6+i*Math.PI/3;p.push([+(Math.cos(a)*.50).toFixed(4),+(Math.sin(a)*.50).toFixed(4)]);}return p;})(),c:'#f472b6'},
  lshape:   {v:[[-0.52,-0.52],[0.52,-0.52],[0.52,0.0],[0.10,0.0],[0.10,0.52],[-0.52,0.52]],c:'#fb923c'},
  irregular:{v:[[-0.62,-0.36],[0.26,-0.60],[0.66,0.10],[0.16,0.56],[-0.46,0.48]],c:'#e879f9'},
  diamond:  {v:[[0,-0.62],[0.42,0],[0,0.62],[-0.42,0]],c:'#f9a8d4'},
  wedge:    {v:[[-0.68,-0.32],[0.68,-0.32],[0.68,0.32],[-0.68,0.04]],c:'#86efac'},
  zigzag:   {v:[[-0.60,-0.32],[-0.10,-0.32],[0.10,0.04],[0.60,0.04],[0.60,0.36],[0.10,0.36],[-0.10,0.0],[-0.60,0.0]],c:'#f87171'},
};

// ─── STATE ───────────────────────────────────────────────────────────────────
let GS=null, myName=ME;
// Local preview state — updated immediately on button press for zero-lag feel
let prevX=0, prevRot=0;

// ─── SOCKET ──────────────────────────────────────────────────────────────────
const sock=io({transports:['websocket'],query:{room:ROOM,player:ME}});

sock.on('connect',()=>sock.emit('join',{r:ROOM,p:ME}));

sock.on('rejected',msg=>{
  document.getElementById('rej-msg').textContent=msg;
  document.getElementById('rej').classList.add('show');
  document.getElementById('app').style.display='none';
});

sock.on('you',n=>{ myName=n; });

sock.on('joined',({n,all})=>{
  toast(`${cap(n)} joined`);
  const both=all.includes('rizwan')&&all.includes('anha');
  if(both||GS) document.getElementById('wov').classList.remove('show');
});

sock.on('S',state=>{
  GS=state;
  // Sync local preview to authoritative server state
  if(state.shape){ prevX=state.shape.x; prevRot=state.shape.rot; }
  updateUI(state);
});

sock.on('chat',m=>appendChat(m));

// ─── REPEAT PRESS for hold-down behaviour ────────────────────────────────────
let _ri=null;
function startRepeat(dir, type){
  if(!GS||GS.settling||GS.turn!==myName) return;
  doAction(dir,type);
  _ri=setInterval(()=>doAction(dir,type), 90);
}
function stopRepeat(){ clearInterval(_ri); _ri=null; }

function doAction(dir,type){
  if(!GS||GS.settling||GS.turn!==myName||GS.matchOver||!GS.active) return;
  if(type==='move'){
    const d=dir==='L'?-0.28:0.28;
    prevX=Math.max(-GS.pw*0.50, Math.min(GS.pw*0.50, prevX+d));
    sock.emit('move',dir);
  } else {
    prevRot+=(dir==='L'?-0.4:0.4);
    sock.emit('rot',dir);
  }
}

// Drop
document.getElementById('bdrop').addEventListener('click',()=>{
  if(!GS||GS.settling||GS.turn!==myName||!GS.active) return;
  sock.emit('drop');
});
document.getElementById('bdrop').addEventListener('touchend',e=>{ e.preventDefault(); if(!GS||GS.settling||GS.turn!==myName||!GS.active) return; sock.emit('drop'); });

// Play again
document.getElementById('bagain').addEventListener('click',()=>{ sock.emit('again'); document.getElementById('gov').classList.remove('show'); });

// Keyboard
window.addEventListener('keydown',e=>{
  if(!GS||GS.settling||GS.turn!==myName) return;
  if(e.key==='ArrowLeft') { e.preventDefault(); doAction('L','move'); }
  if(e.key==='ArrowRight'){ e.preventDefault(); doAction('R','move'); }
  if(e.key==='z'||e.key==='Z'){ e.preventDefault(); doAction('L','rot'); }
  if(e.key==='x'||e.key==='X'){ e.preventDefault(); doAction('R','rot'); }
  if(e.key===' '){ e.preventDefault(); if(!GS.settling&&GS.turn===myName&&GS.active) sock.emit('drop'); }
});

// ─── UI UPDATE ───────────────────────────────────────────────────────────────
function cap(s){ return s?s[0].toUpperCase()+s.slice(1):s; }

function updateUI(s){
  document.getElementById('wov').classList.remove('show');
  document.getElementById('sr').textContent=s.scores.rizwan;
  document.getElementById('sa').textContent=s.scores.anha;
  document.getElementById('rbadge').textContent=`Round ${s.round+1}/3`;

  const tb=document.getElementById('tb');
  tb.className='';
  if(s.settling){
    tb.classList.add('se');
    tb.innerHTML='<span style="color:var(--ye)">⏳ Settling…</span>';
  } else if(s.matchOver){
    tb.innerHTML='🏆 Match over!';
  } else if(!s.active){
    tb.innerHTML='Round ended — next starting…';
  } else {
    tb.classList.add(s.turn==='rizwan'?'rt':'at');
    const col=`var(--${s.turn==='rizwan'?'r':'a'})`;
    tb.innerHTML=s.turn===myName
      ? `✨ Your turn, <span style="color:${col}">${cap(myName)}</span>!`
      : `<span style="color:${col}">${cap(s.turn)}</span>'s turn…`;
  }

  // Position indicator
  if(s.pw){
    const pct=((prevX/(s.pw*0.50))+1)/2*100;
    document.getElementById('pi').style.left=Math.max(2,Math.min(98,pct))+'%';
  }

  // Button states
  const canAct=s.turn===myName&&!s.settling&&!s.matchOver&&s.active;
  ['bml','bmr','brl','brr','bdrop'].forEach(id=>{ document.getElementById(id).disabled=!canAct; });

  // Match over overlay
  const gov=document.getElementById('gov');
  if(s.matchOver&&s.winner){
    const col=s.winner==='rizwan'?'var(--r)':'var(--a)';
    document.getElementById('gov-title').innerHTML=`🏆 <span style="color:${col}">${cap(s.winner)}</span> wins!`;
    document.getElementById('gov-sub').textContent=s.winner===myName?'Congratulations! 🎉':'Better luck next time!';
    gov.classList.add('show');
  } else gov.classList.remove('show');
}

// ─── DRAWING — 60fps, NO shadowBlur ──────────────────────────────────────────
function rv(v,a){ const c=Math.cos(a),si=Math.sin(a); return [v[0]*c-v[1]*si, v[0]*si+v[1]*c]; }

function poly(verts,fill,stroke,lw){
  ctx.beginPath();
  ctx.moveTo(verts[0][0],verts[0][1]);
  for(let i=1;i<verts.length;i++) ctx.lineTo(verts[i][0],verts[i][1]);
  ctx.closePath();
  ctx.fillStyle=fill; ctx.fill();
  if(stroke){ ctx.strokeStyle=stroke; ctx.lineWidth=lw||1.5; ctx.stroke(); }
}

function worldToCanvas(localV, pos, angle){
  return localV.map(v=>{ const r=rv(v,angle); return [wx(pos[0]+r[0]), wy(pos[1]+r[1])]; });
}

function draw(){
  ctx.clearRect(0,0,CW,CH);
  if(!GS){ requestAnimationFrame(draw); return; }
  const s=GS;

  // Platform
  const pw=s.pw, ph=0.3;
  const px=wx(-pw/2), pyw=wy(ph/2), pwpx=pw*SC, phpx=ph*SC;
  // Gradient fill
  const grd=ctx.createLinearGradient(px,pyw,px+pwpx,pyw);
  grd.addColorStop(0,'rgba(124,111,239,0.20)');
  grd.addColorStop(1,'rgba(238,111,174,0.20)');
  ctx.fillStyle=grd;
  ctx.strokeStyle='rgba(255,255,255,0.12)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.roundRect(px,pyw,pwpx,phpx,3); ctx.fill(); ctx.stroke();
  // Bright top edge
  ctx.strokeStyle='rgba(180,160,255,0.45)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(px,pyw); ctx.lineTo(px+pwpx,pyw); ctx.stroke();

  // Stacked bodies
  s.bodies.forEach(b=>{
    const def=SD[b.name]||SD.square;
    const vraw=b.v||def.v;
    const cv=worldToCanvas(vraw, b.pos, b.angle);
    const col=b.c||def.c;
    ctx.save();
    poly(cv, col, 'rgba(255,255,255,0.16)', 1.4);
    // Simple top-edge highlight line (cheap depth)
    ctx.globalAlpha=0.18; ctx.strokeStyle='#fff'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.moveTo(cv[0][0],cv[0][1]);
    const len=Math.min(2,cv.length-1);
    for(let i=1;i<=len;i++) ctx.lineTo(cv[i][0],cv[i][1]);
    ctx.stroke();
    ctx.restore();
  });

  // Ghost preview — uses LOCAL prevX, prevRot for instant response
  if(s.shape && s.turn===myName && !s.settling && !s.matchOver && s.active){
    const def=SD[s.shape.name]||SD.square;
    const gY=7.2;
    const cv=worldToCanvas(def.v, [prevX, gY], prevRot);
    ctx.save();
    ctx.globalAlpha=0.55;
    poly(cv, def.c+'66', def.c+'bb', 1.2);
    // Drop line
    ctx.globalAlpha=0.18; ctx.strokeStyle=def.c; ctx.lineWidth=1.2;
    ctx.setLineDash([4,5]);
    ctx.beginPath(); ctx.moveTo(wx(prevX),wy(gY-0.8)); ctx.lineTo(wx(prevX),wy(0.2));
    ctx.stroke(); ctx.setLineDash([]);
    ctx.restore();
  }

  // Danger zone line
  const dcy=wy(-7);
  if(dcy>0&&dcy<CH){
    ctx.save(); ctx.globalAlpha=0.10; ctx.strokeStyle='#ef4444'; ctx.lineWidth=1;
    ctx.setLineDash([4,6]); ctx.beginPath(); ctx.moveTo(0,dcy); ctx.lineTo(CW,dcy); ctx.stroke();
    ctx.setLineDash([]); ctx.restore();
  }

  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);

// ─── CHAT ────────────────────────────────────────────────────────────────────
document.getElementById('chatbtn').addEventListener('click',()=>{
  document.getElementById('cpanel').classList.toggle('show');
  document.getElementById('chatbtn').classList.remove('ping');
});
document.getElementById('cclose').addEventListener('click',()=>document.getElementById('cpanel').classList.remove('show'));
document.getElementById('csend').addEventListener('click',sendChat);
document.getElementById('cinput').addEventListener('keydown',e=>{ if(e.key==='Enter') sendChat(); });
function sendChat(){
  const v=document.getElementById('cinput').value.trim(); if(!v) return;
  sock.emit('chat',v); document.getElementById('cinput').value='';
}
function appendChat(m){
  const d=document.createElement('div'); d.className='cm';
  d.innerHTML=`<span class="who ${m.from}">${cap(m.from)}</span><span>${esc(m.text)}</span><span class="wt">${m.t}</span>`;
  const c=document.getElementById('cmsgs'); c.appendChild(d); c.scrollTop=c.scrollHeight;
  if(!document.getElementById('cpanel').classList.contains('show')) document.getElementById('chatbtn').classList.add('ping');
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ─── TOAST ───────────────────────────────────────────────────────────────────
let _t; function toast(msg,d=2000){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); clearTimeout(_t); _t=setTimeout(()=>el.classList.remove('show'),d); }

// Boot
document.getElementById('wov').classList.add('show');
</script>
